version: '3.8'

services:
  taskmanager-staging:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: taskmanager-api:staging
    container_name: taskmanager-staging
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-staging-secret-change-me}
      - LOG_LEVEL=info
    volumes:
      - staging_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health/ready', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "environment=staging"
      - "app=taskmanager-api"

volumes:
  staging_logs: