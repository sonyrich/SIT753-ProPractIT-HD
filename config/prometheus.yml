global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'taskmanager-api'
    static_configs:
      - targets: ['taskmanager-prod:3000']
    metrics_path: /health
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']